<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Victor Dias Transportes ERP Local</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--ink:#172033;--muted:#697386;--blue:#0f4c81;--blue2:#1f7a8c;--line:#dce5ef;--ok:#138a45;--bad:#b91c1c;--warn:#b7791f;--shadow:0 14px 35px rgba(15,39,66,.09);--r:18px}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,Inter,sans-serif;color:var(--ink)}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#0f2742,#173b61);color:#fff;padding:18px;position:sticky;top:0;height:100vh}.logo{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:16px;margin-bottom:15px}.logo b{display:block;font-size:22px}.logo span{font-size:12px;color:#d9e8f8}.nav{display:grid;gap:8px}.nav button{border:0;border-radius:14px;padding:13px;text-align:left;background:rgba(255,255,255,.08);color:#ecf6ff;font-weight:800;cursor:pointer}.nav button.active{background:#fff;color:var(--blue)}.main{min-width:0}.top{position:sticky;top:0;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:5;padding:15px 22px;display:flex;justify-content:space-between;gap:10px;align-items:center}.top h1{font-size:22px;margin:0}.clock{font-weight:800;color:var(--blue);background:#eaf3fb;border:1px solid #d4e5f4;border-radius:14px;padding:10px 12px}main{padding:18px;max-width:1400px;margin:auto}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:14px}.kpi{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--r);padding:14px}.kpi span{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800}.kpi b{display:block;font-size:22px;margin-top:7px}.panel{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--r);padding:16px}.section{display:none}.section.active{display:block}h2{margin:0 0 12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff;outline:none}textarea{min-height:80px}.search{max-width:350px}.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}.btn2{background:#edf5fc;color:var(--blue);border:0;border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:15px}table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;white-space:nowrap}th{background:#f8fafc;color:var(--muted);font-size:11px;text-transform:uppercase}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;display:inline-block}.b-ok{background:#dcfce7;color:#166534}.b-bad{background:#fee2e2;color:#991b1b}.b-warn{background:#fef3c7;color:#92400e}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:20;padding:12px}.modal.open{display:flex}.box{background:#fff;max-width:850px;width:100%;border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.28);padding:16px;max-height:92vh;overflow:auto}.boxhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}label{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase}.actions{display:flex;gap:8px;flex-wrap:wrap}.doclist{display:grid;gap:10px}.doc{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfdff}.small{font-size:12px;color:var(--muted)}@media(max-width:1000px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.nav{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.top{position:relative}th,td{white-space:normal}}@media(max-width:560px){main{padding:10px}.cards{grid-template-columns:1fr}.nav{grid-template-columns:1fr}.top{display:block}.clock{margin-top:8px;text-align:center}}
@media print{.side,.toolbar,.actions,.top .clock{display:none}.app{display:block}.section{display:block}.panel,.kpi{box-shadow:none}}
</style>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f4c81">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Victor Dias ERP">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="app"><aside class="side"><div class="logo"><b>Victor Dias</b><span>Transportes ERP Local</span></div><div class="nav" id="nav"></div><p class="small" style="color:#d9e8f8;margin-top:14px">Funciona sem internet. Salva no navegador. Depois podemos sincronizar online.</p></aside><div class="main"><header class="top"><div><h1>Victor Dias Transportes</h1><div class="small">ERP simples para celular e PC</div></div><div class="clock" id="clock"></div></header><main><div class="cards" id="kpis"></div><div class="panel" id="content"></div></main></div></div>
<div class="modal" id="modal"><div class="box"><div class="boxhead"><h2 id="modalTitle">Novo</h2><button class="btn2" onclick="closeModal()">Fechar</button></div><form id="form"></form></div></div>
<script>
const menus=[['dashboard','🏠 Painel'],['contratos','📍 Contratos'],['motoristas','👤 Motoristas'],['frota','🚐 Frota'],['financeiro','💰 Financeiro'],['manutencao','🛠️ Manutenção'],['documentos','📄 Documentos'],['backup','💾 Backup']];
const fields={
contratos:[['cidade','Cidade'],['motorista','Motorista'],['veiculo','Veículo'],['valor','Valor mensal','money'],['kmDia','Km por dia','num'],['dias','Dias/mês','num'],['status','Status','select',['Ativo','Pausado','Em expansão']],['obs','Observação','area']],
motoristas:[['nome','Nome'],['telefone','Telefone'],['cidade','Cidade'],['veiculo','Veículo'],['cnh','CNH'],['validade','Validade CNH','date'],['status','Status','select',['Ativo','Férias','Afastado','Desligado']]],
frota:[['placa','Placa'],['modelo','Modelo'],['ano','Ano','num'],['motorista','Motorista'],['km','KM atual','num'],['proxima','Próxima troca/revisão','date'],['status','Status','select',['Rodando','Manutenção','Reserva','Parado']]],
financeiro:[['data','Data','date'],['cidade','Cidade'],['tipo','Tipo','select',['Entrada','Saída']],['categoria','Categoria'],['valor','Valor','money'],['descricao','Descrição']],
manutencao:[['data','Data','date'],['veiculo','Veículo'],['servico','Serviço'],['valor','Valor','money'],['km','KM','num'],['proxima','Próxima revisão','date'],['status','Status','select',['Agendada','Feita','Pendente']]],
documentos:[['tipo','Tipo','select',['CNH','CRLV','Seguro','ANTT','Toxicológico','Contrato','Outro']],['referencia','Motorista/Veículo/Cidade'],['validade','Validade','date'],['arquivo','Nome do arquivo/link'],['obs','Observação','area']]
};
let db=JSON.parse(localStorage.getItem('vd_erp_local')||'null')||{contratos:[],motoristas:[],frota:[],financeiro:[],manutencao:[],documentos:[]};
let current='dashboard', editing=null, search='';
function save(){localStorage.setItem('vd_erp_local',JSON.stringify(db));render();}
function brl(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function parse(v){return Number(String(v||'').replace(/\./g,'').replace(',','.'))||0}
function today(){return new Date().toISOString().slice(0,10)}
function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random()}
function init(){document.getElementById('nav').innerHTML=menus.map(m=>`<button onclick="go('${m[0]}')" id="n_${m[0]}">${m[1]}</button>`).join(''); setInterval(()=>clock.textContent=new Date().toLocaleString('pt-BR'),1000); render();}
function go(m){current=m;search='';editing=null;render();}
function totals(){let contratos=db.contratos.reduce((a,x)=>a+parse(x.valor),0), km=db.contratos.reduce((a,x)=>a+parse(x.kmDia)*(parse(x.dias)||22),0), ent=db.financeiro.filter(x=>x.tipo==='Entrada').reduce((a,x)=>a+parse(x.valor),0), sai=db.financeiro.filter(x=>x.tipo==='Saída').reduce((a,x)=>a+parse(x.valor),0);return{contratos,km,ent,sai,saldo:ent-sai,mot:db.motoristas.filter(x=>x.status!=='Desligado').length,vei:db.frota.filter(x=>x.status==='Rodando').length}}
function renderKpis(){let t=totals();kpis.innerHTML=`<div class=kpi><span>Contratos</span><b>${brl(t.contratos)}</b></div><div class=kpi><span>Km/mês</span><b>${t.km.toLocaleString('pt-BR')}</b></div><div class=kpi><span>Motoristas</span><b>${t.mot}</b></div><div class=kpi><span>Veículos rodando</span><b>${t.vei}</b></div><div class=kpi><span>Entradas</span><b>${brl(t.ent)}</b></div><div class=kpi><span>Saldo</span><b>${brl(t.saldo)}</b></div>`}
function render(){renderKpis();menus.forEach(m=>document.getElementById('n_'+m[0]).classList.toggle('active',m[0]===current)); if(current==='dashboard')return dash(); if(current==='backup')return backup(); list(current);}
function dash(){let t=totals();content.innerHTML=`<h2>Painel geral</h2><div class=grid><div class=doc><b>Resumo</b><p>Valor a receber: <b>${brl(t.contratos)}</b></p><p>Saldo do caixa: <b>${brl(t.saldo)}</b></p><p>Total KM/mês: <b>${t.km.toLocaleString('pt-BR')} km</b></p></div><div class=doc><b>Alertas</b>${alerts()}</div><div class=doc><b>Atalhos</b><p><button class=btn onclick="go('contratos');openModal('contratos')">Novo contrato</button></p><p><button class=btn2 onclick="go('financeiro');openModal('financeiro')">Lançar caixa</button></p></div></div>`}
function alerts(){let now=new Date();let out=[];db.motoristas.forEach(x=>{if(x.validade){let d=new Date(x.validade+'T00:00');let dias=Math.ceil((d-now)/86400000); if(dias<=30)out.push(`CNH ${x.nome}: ${dias} dias`)}});db.frota.forEach(x=>{if(x.proxima){let d=new Date(x.proxima+'T00:00');let dias=Math.ceil((d-now)/86400000); if(dias<=30)out.push(`Revisão ${x.placa||x.modelo}: ${dias} dias`)}});return out.length?'<ul><li>'+out.join('</li><li>')+'</li></ul>':'<p class=small>Nenhum alerta importante.</p>'}
function list(tab){let labels={contratos:'Contratos',motoristas:'Motoristas',frota:'Frota',financeiro:'Financeiro',manutencao:'Manutenção',documentos:'Documentos'};let data=(db[tab]||[]).filter(x=>JSON.stringify(x).toLowerCase().includes(search.toLowerCase()));let head=fields[tab].map(f=>f[1]);content.innerHTML=`<h2>${labels[tab]}</h2><div class=toolbar><input class=search placeholder="Pesquisar..." value="${search}" oninput="search=this.value;list('${tab}')"><button class=btn onclick="openModal('${tab}')">+ Novo</button><button class=btn2 onclick="window.print()">Imprimir</button></div><div class=tablewrap><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}<th>Ações</th></tr></thead><tbody>${data.map(x=>row(tab,x)).join('')||`<tr><td colspan=20>Nenhum registro.</td></tr>`}</tbody></table></div>`}
function row(tab,x){return `<tr>${fields[tab].map(f=>{let v=x[f[0]]||''; if(f[2]==='money')v=brl(parse(v)); if(f[0]==='status'||f[0]==='tipo')v=`<span class="badge ${v==='Ativo'||v==='Rodando'||v==='Entrada'||v==='Feita'?'b-ok':v==='Saída'||v==='Parado'||v==='Desligado'?'b-bad':'b-warn'}">${v}</span>`; return `<td>${v}</td>`}).join('')}<td><div class=actions><button class=btn2 onclick="openModal('${tab}','${x.id}')">Editar</button><button class="btn2 danger" onclick="del('${tab}','${x.id}')">Excluir</button></div></td></tr>`}
function openModal(tab,id){editing={tab,id};let obj=id?db[tab].find(x=>x.id===id):{};modalTitle.textContent=(id?'Editar ':'Novo ')+tab;form.innerHTML=`<div class=grid>${fields[tab].map(f=>fieldHtml(f,obj[f[0]]||'')).join('')}</div><div class=toolbar style="margin-top:14px"><button class=btn>Salvar</button><button type=button class=btn2 onclick="closeModal()">Cancelar</button></div>`;form.onsubmit=e=>{e.preventDefault();let item=id?db[tab].find(x=>x.id===id):{id:uid()};fields[tab].forEach(f=>item[f[0]]=document.getElementById('f_'+f[0]).value); if(!id)db[tab].push(item); closeModal(); save();};modal.classList.add('open')}
function fieldHtml(f,v){let [k,l,t,opts]=f;if(t==='select')return `<div><label>${l}</label><select id="f_${k}">${opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select></div>`;if(t==='area')return `<div style="grid-column:1/-1"><label>${l}</label><textarea id="f_${k}">${v}</textarea></div>`;return `<div><label>${l}</label><input id="f_${k}" type="${t==='date'?'date':'text'}" value="${v}" ${k==='data'&&!v?'value="'+today()+'"':''}></div>`}
function closeModal(){modal.classList.remove('open')}
function del(tab,id){if(confirm('Excluir este registro?')){db[tab]=db[tab].filter(x=>x.id!==id);save();}}
function backup(){content.innerHTML=`<h2>Backup</h2><div class=toolbar><button class=btn onclick="exportJson()">Baixar backup</button><label class=btn2>Importar backup<input type=file accept=.json style="display:none" onchange="importJson(event)"></label><button class="btn2 danger" onclick="resetAll()">Zerar tudo</button></div><p class=small>Use o backup para trocar de computador ou guardar seus dados.</p>`}
function exportJson(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='backup_victor_dias_erp.json';a.click()}
function importJson(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);save();alert('Backup importado.')}catch{alert('Arquivo inválido.')}};r.readAsText(file)}
function resetAll(){if(confirm('Apagar todos os dados?')){localStorage.removeItem('vd_erp_local');location.reload();}}
init();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
